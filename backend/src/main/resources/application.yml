spring:
  application:
    name: convivium-backend
  # Carrega application-local.yml (Stripe etc.) se existir; não quebra se não existir
  profiles:
    include: local

  datasource:
    url: jdbc:postgresql://localhost:5432/convivium
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

app:
  jwt:
    secret: c29tZS1zdXBlci1zZWNyZXQta2V5LWZvci1jb252aXZpdW0tand0LXRva2VuLWdlbmVyYXRpb24tbXVzdC1iZS1sb25n
    access-token-expiration: 900000    # 15 minutes
    refresh-token-expiration: 604800000 # 7 days

  # Login com Google (cadastro do morador)
  google:
    client-id: ""  # Opcional: valida que o token veio do seu app (ex: xxx.apps.googleusercontent.com)

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://convivium2.onrender.com}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"

  # WhatsApp via Meta (Cloud API) - comunicados e notificação de encomendas
  whatsapp:
    enabled: false
    phone-number-id: ""   # ID do número WhatsApp Business (Meta)
    access-token: ""      # Token de acesso permanente (Meta Business)
    base-url: "http://localhost:8080"  # URL pública do backend (para link da foto no WhatsApp)
    template:
      encomenda: "encomenda_na_portaria"  # Nome do template aprovado no Meta

  # Stripe (pagamentos). Em produção, use variáveis de ambiente (STRIPE_SECRET_KEY etc.)
  stripe:
    enabled: ${STRIPE_ENABLED:false}
    secret-key: ${STRIPE_SECRET_KEY:}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}      # whsec_... (configurar após criar webhook no Stripe Dashboard)
    success-url: "${APP_FRONTEND_URL:http://localhost:5173}/c/{condoId}/financial?payment=success"
    cancel-url: "${APP_FRONTEND_URL:http://localhost:5173}/c/{condoId}/financial?payment=cancel"
    return-url: "${APP_FRONTEND_URL:http://localhost:5173}/c/{condoId}/payment/return?session_id={CHECKOUT_SESSION_ID}"

  storage:
    # local = pasta do sistema (desenvolvimento). s3 = S3/MinIO (produção, ex: Render)
    type: local
    local:
      path: ./uploads
    # S3 / MinIO (usado quando type: s3). No Render: defina STORAGE_TYPE=s3 e as env vars abaixo
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: convivium
    region: us-east-1

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.convivium: DEBUG
    org.springframework.security: DEBUG
