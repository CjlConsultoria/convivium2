sonar.projectKey=CjlConsultoria_convivium2
sonar.organization=cjlconsultoria
sonar.projectName=Convivium 2.0

# Multi-module: backend + frontend
sonar.modules=backend,frontend

# ─── Quality Rules ────────────────────────────────────────────────
# Temporariamente false para não bloquear deploy; ajuste o Quality Gate no SonarCloud ou adicione testes
sonar.qualitygate.wait=false

# ─── Backend (Java / Spring Boot) ────────────────────────────────
backend.sonar.projectBaseDir=backend
backend.sonar.sources=src/main/java
backend.sonar.java.binaries=target/classes
backend.sonar.java.source=21
backend.sonar.exclusions=**/target/**,**/generated-sources/**
backend.sonar.coverage.exclusions=**/entity/**,**/dto/**,**/config/**,**/*Application.java,**/repository/**
backend.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# ─── Frontend (Vue 3 / TypeScript) ───────────────────────────────
frontend.sonar.projectBaseDir=frontend
frontend.sonar.sources=src
frontend.sonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts,**/*.test.ts
frontend.sonar.coverage.exclusions=**/views/**,**/layouts/**,**/router/**,**/main.ts,**/App.vue,**/*.d.ts,**/api/client.ts,**/types/**
frontend.sonar.javascript.lcov.reportPaths=coverage/lcov.info
frontend.sonar.typescript.lcov.reportPaths=coverage/lcov.info
