version: 2

updates:
  - package-ecosystem: maven
    directory: /backend
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels: [dependencies]
    commit-message:
      prefix: "deps:"
    groups:
      all-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels: [dependencies]
    commit-message:
      prefix: "deps:"
    groups:
      all-dependencies:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels: [dependencies]
    commit-message:
      prefix: "deps:"
    groups:
      all-dependencies:
        patterns: ["*"]
