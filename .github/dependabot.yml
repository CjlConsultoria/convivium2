version: 2

updates:
  # ─── Backend: Maven (Java) ───────────────────────────────────────
  - package-ecosystem: maven
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: "deps(backend):"
    groups:
      all-backend-deps:
        patterns:
          - "*"

  # ─── Frontend: npm (Vue/TypeScript) ──────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "deps(frontend):"
    groups:
      production-deps:
        dependency-type: production
        patterns:
          - "*"
      dev-deps:
        dependency-type: development
        patterns:
          - "*"

  # ─── GitHub Actions ──────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "deps(ci):"
    groups:
      all-actions:
        patterns:
          - "*"
